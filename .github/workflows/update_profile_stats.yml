name: Update profile SVGs

on:
  schedule:
    # JST 06:00 -> UTC 21:00
    - cron: "0 21 * * *"
  workflow_dispatch: {}

concurrency:
  group: update-profile-svgs
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      PROFILE_GITHUB_TOKEN: ${{ secrets.PROFILE_GITHUB_TOKEN }}
      PROFILE_USERNAME: sangikousenuser
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate secrets
        run: |
          set -euo pipefail

          if [ -z "${PROFILE_GITHUB_TOKEN:-}" ]; then
            echo "PROFILE_GITHUB_TOKEN is not set in repository secrets."
            exit 1
          fi

      - name: Generate profile SVGs
        run: |
          set -euo pipefail
          node .github/scripts/generate-profile-svgs.mjs

      - name: Update marker file
        run: |
          set -euo pipefail
          mkdir -p .github
          date -u +%FT%TZ > .github/last-run.txt

      - name: Commit and push
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/last-run.txt img/profile_stats.svg img/profile_languages.svg
          git commit -m "Update profile stats"
          git push
